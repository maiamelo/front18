<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front18 | Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/front18.css">
    <style>
        .auth-wrapper { position: relative; overflow: hidden; }
        .red-blur {
            position: absolute; right: -50px; bottom: -50px;
            width: 400px; height: 400px; background: var(--accent-red);
            filter: blur(200px); opacity: 0.15; z-index: 0;
        }
        .msg-error {
            background: rgba(230,0,0,0.1); border: 1px solid rgba(230,0,0,0.3);
            color: var(--accent-red); padding: 10px 14px; font-size: 0.85rem;
            margin-bottom: 1rem; display: none; border-radius: 2px;
        }
        .msg-success {
            background: rgba(0,255,128,0.1); border: 1px solid rgba(0,255,128,0.3);
            color: #00FF80; padding: 10px 14px; font-size: 0.85rem;
            margin-bottom: 1rem; display: none; border-radius: 2px;
        }
    </style>
</head>
<body>

    <header style="position: absolute; top: 0; left: 0; width: 100%; padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
        <a href="index.html" class="logo">FRONT<span>18</span></a>
        <a href="login.html" class="btn" style="padding: 0.5rem 1.5rem; font-size: 0.8rem; border-color: var(--text-secondary); color: var(--text-secondary);">← Já tenho conta</a>
    </header>

    <div class="auth-wrapper">
        <div class="red-blur"></div>
        <div class="auth-box" style="position: relative; z-index: 1;">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Criar Conta Grátis</h2>
            <p style="text-align:center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">Plano Starter · 50 verificações/mês · Sem cartão</p>

            <div id="msgError" class="msg-error"></div>
            <div id="msgSuccess" class="msg-success"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirma">Confirmar Senha</label>
                    <input type="password" id="confirma" placeholder="repita a senha" required>
                </div>
                <button type="submit" id="btnCadastrar" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Criar Minha Conta
                </button>
            </form>
            <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                Já tem conta? <a href="login.html" class="text-red">Entrar</a>
            </p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".auth-box", { y: 30, opacity: 0, duration: 0.8, ease: "power3.out" });

        const form     = document.getElementById('registerForm');
        const btnCad   = document.getElementById('btnCadastrar');
        const msgError = document.getElementById('msgError');
        const msgOk    = document.getElementById('msgSuccess');

        function showError(msg) {
            msgError.textContent = msg;
            msgError.style.display = 'block';
            msgOk.style.display = 'none';
        }
        function showSuccess(msg) {
            msgOk.textContent = msg;
            msgOk.style.display = 'block';
            msgError.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgError.style.display = 'none';
            msgOk.style.display = 'none';

            const email   = document.getElementById('email').value.trim();
            const senha   = document.getElementById('senha').value;
            const confirma = document.getElementById('confirma').value;

            if (senha !== confirma) return showError('As senhas não conferem.');
            if (senha.length < 6)   return showError('A senha deve ter ao menos 6 caracteres.');

            btnCad.disabled = true;
            btnCad.textContent = 'Criando conta...';

            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccess('✅ Conta criada! Redirecionando para o login...');
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showError(data.message || 'Erro ao criar conta.');
                    btnCad.disabled = false;
                    btnCad.textContent = 'Criar Minha Conta';
                }
            } catch (err) {
                showError('Erro de conexão. Tente novamente.');
                btnCad.disabled = false;
                btnCad.textContent = 'Criar Minha Conta';
            }
        });
    </script>
</body>
</html>
